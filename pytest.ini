[pytest]
markers =
    property_based: Pruebas fundamentadas en propiedades (Hypothesis).
    topology: Verificación de invariantes topológicos.
    spectral: Análisis de teoría espectral de grafos.
    control: Pruebas de teoría de control Port-Hamiltoniana.
    audit: Auditoría y trazabilidad vectorial.
    stochastic: Simulación y termodinámica estadística.
    performance: Evaluación asintótica del hardware.
    property: Mapeos de validación en retículos.
    unit: Pruebas unitarias.
    integration: Pruebas de integración.
    slow: Pruebas de larga duración.
    benchmark: Pruebas de rendimiento comparativo.
    timeout: Tiempo de espera para pruebas.
    wisdom: Pruebas del estrato WISDOM.
    order_theory: Pruebas basadas en teoría de orden.
    categorical: Pruebas de estructuras categóricas.
    physics: Pruebas del estrato PHYSICS.
    tactics: Pruebas del estrato TACTICS.
    strategy: Pruebas del estrato STRATEGY.
    stress: Pruebas de estrés y carga.
    concurrent: Pruebas de concurrencia.
